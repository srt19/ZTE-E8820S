name: Build ImmortalWrt Firmware
run-name: Build ImmortalWrt Firmware for ZTE E8820S ${{ inputs.repo_branch }}

on:
  workflow_dispatch:
    inputs:
      repo_branch:
        description: 'ImmortalWrt branch or tag (e.g., openwrt-23.05, v23.05.3)'
        required: true
        type: string

      config_link:
        description: 'Paste raw config file from pastebin'
        required: true
        type: string

      toolchain_link:
        description: 'URL to the pre-compiled toolchain tarball'
        required: true
        type: string
      
      llvm_link:
        description: 'URL to the pre-compiled LLVM BPF tarball'
        required: true
        type: string

      target_arch:
        description: 'Target architecture (e.g., ramips/mt7621)'
        required: true
        default: 'ramips/mt7621'
        type: string

      is_latest:
        description: 'Set the release as latest'
        default: false
        type: boolean

      is_prerelease:
        description: 'Set the release as pre-release'
        default: true
        type: boolean

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  TOOLCHAIN_URL : ${{ inputs.toolchain_link }}
  LLVM_URL : ${{ inputs.llvm_link }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo apt-get clean

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget

    - name: Clone ImmortalWrt Source
      run: git clone --depth 1 $REPO_URL -b ${{ inputs.repo_branch }} immortalwrt

    - name: Download External Toolchain
      # Downloads and extracts it toolchain and llvm
      run: |
        mkdir -p /opt/toolchain
        toolchain_name="${TOOLCHAIN_URL##*/}"
        llvm_name="${LLVM_URL##*/}"
        
        echo "Downloading $toolchain_name..."
        wget -q "$TOOLCHAIN_URL"
        tar -xf "$toolchain_name" -C /opt/toolchain --strip-components=2 --wildcards "*/toolchain-mipsel_24kc_gcc-*"
        rm "$toolchain_name"

        echo "Downloading $LLVM_URL..."
        wget -q "$LLVM_URL"
        tar -xf "$llvm_name" -C ./immortalwrt
        rm "$llvm_name"

    - name: Applying patch
      run: |
        cp patch/mt7621_zte_e8820s.dts immortalwrt/target/linux/ramips/dts
        sed -i '/esac/e cat patch/leds.txt' immortalwrt/target/linux/ramips/mt7621/base-files/etc/board.d/01_leds
        sed -i '72r patch/upgrade.txt' immortalwrt/target/linux/ramips/mt7621/base-files/lib/upgrade/platform.sh
        cat patch/zte.txt >> immortalwrt/target/linux/ramips/image/mt7621.mk
        cp patch/99-default-settings immortalwrt/package/base-files/files/etc/uci-defaults

    - name: Update and Install Feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Custom Configuration & Inject Toolchain
      working-directory: ./immortalwrt
      run: |
        wget -q -O .config "${{ inputs.config_link }}"
        ./scripts/ext-toolchain.sh --toolchain /opt/toolchain --overwrite-config --config ${{ inputs.target_arch }}
        make defconfig

    - name: Download Packages
      working-directory: ./immortalwrt
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile ImmortalWrt
      working-directory: ./immortalwrt
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        rm -rf bin/targets/ramips/mt7621/packages

    - name: Extract Vermagic
      id: get_vermagic
      run: |
        # Adjust the path to where your JSON file is located
        JSON_FILE="immortalwrt/bin/targets/ramips/mt7621/profiles.json"
        VERMAGIC=$(grep -oP '"vermagic":"\K[^"]+' "$JSON_FILE")
        
        VER_URL=$(dirname "$inputs.toolchain_link")

        if curl -s "$VER_URL/kmods/" | grep -q $VERMAGIC; then
          echo "vermagic=$VERMAGIC | ✅ Matched with Openwrt Official Build" >> $GITHUB_OUTPUT
        else
          echo "vermagic=$VERMAGIC | ❌ Mismatch with ImmortalWrt Official Build" >> $GITHUB_OUTPUT
        fi

    - name: Generate Release Tag
      id: tag
      run: |
        echo "release_tag=${{ inputs.repo_branch }}-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
        echo "release_name=ImmortalWrt ZTE E8820S ${{ inputs.repo_branch }} $(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2.6.1
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: ${{ steps.tag.outputs.release_name }}
        prerelease: ${{ inputs.is_prerelease }}
        make_latest: ${{ inputs.is_prerelease == false && 'true' || 'false'}}
        files: immortalwrt/bin/targets/ramips/mt7621/*
        body: |
          ## ZTE E8820S ImmortalWrt Firmware ${{ inputs.repo_branch }}
          Automated ImmortalWrt firmware build for ZTE E8820S.
          
          Version: ${{ inputs.repo_branch }}
          Vermagic: ${{ steps.get_vermagic.outputs.vermagic }}
          *Compiled using pre-compiled ImmortalWrt toolchain*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}